<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Dashboard — Arambhika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html,body { height:100%; overflow:hidden; }
    .tm-wrap { display:flex; height:calc(100vh - 54px); overflow:hidden; }

    /* Left panel */
    .tm-left { width:340px; flex-shrink:0; display:flex; flex-direction:column; border-right:1px solid var(--border); background:var(--bg); }
    .tm-left-head { padding:12px 14px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .tm-person { font-size:17px; font-weight:700; }
    .tm-date   { font-size:11px; color:var(--muted); margin-top:1px; }
    .tm-stats  { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:6px; margin-top:10px; }
    .tm-stat   { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:6px 8px; text-align:center; }
    .tm-stat-v { font-size:17px; font-weight:700; line-height:1; }
    .tm-stat-l { font-size:9px; color:var(--muted); margin-top:2px; text-transform:uppercase; letter-spacing:.3px; }
    .tm-stat.danger .tm-stat-v { color:var(--danger); }
    .tm-stat.warn   .tm-stat-v { color:#f59e0b; }
    .tm-stat.ok     .tm-stat-v { color:#16a34a; }

    /* AI brief — right panel */
    .tm-brief-view { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
    .brief-rh { padding:14px 20px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; gap:10px; }
    .brief-rh-title { font-size:15px; font-weight:700; }
    .brief-rh-ts    { font-size:11px; color:var(--muted); margin-top:2px; }
    .brief-rh-actions { display:flex; align-items:center; gap:7px; }
    .brief-body { flex:1; overflow-y:auto; padding:20px 22px; }
    .brief-loading { color:var(--muted); font-size:13px; display:flex; align-items:center; gap:8px; }
    .brief-content { font-size:13px; line-height:1.8; color:var(--text); white-space:pre-wrap; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px 18px; }
    .brief-empty { color:var(--muted); font-size:13px; text-align:center; padding:40px 20px; }
    .detail-back { font-size:11px; color:var(--primary); cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:3px; margin-bottom:12px; background:none; border:none; font-family:inherit; padding:0; }
    .detail-back:hover { text-decoration:underline; }

    /* Search + filter */
    .tm-search-bar { padding:8px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .tm-search-bar input { width:100%; border:1px solid var(--border); border-radius:8px; padding:7px 10px; font-size:12px; font-family:inherit; outline:none; background:var(--card); color:var(--text); box-sizing:border-box; }
    .tm-search-bar input:focus { border-color:var(--primary); }
    .tm-filter-tabs { display:flex; gap:4px; padding:6px 10px 6px; flex-shrink:0; flex-wrap:wrap; border-bottom:1px solid var(--border); }
    .tm-tab { padding:3px 8px; border-radius:10px; font-size:11px; font-weight:500; border:1px solid var(--border); background:var(--bg); cursor:pointer; color:var(--muted); white-space:nowrap; }
    .tm-tab.on { background:var(--primary); color:#fff; border-color:var(--primary); }

    /* Customer list */
    .tm-list { flex:1; overflow-y:auto; }
    .tm-item { padding:9px 13px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
    .tm-item:hover { background:var(--surface); }
    .tm-item.active { background:#ede9fe; border-left:3px solid var(--primary); }
    .tm-item-name { font-size:13px; font-weight:600; }
    .tm-item-sub  { font-size:11px; color:var(--muted); margin-top:2px; }
    .tm-item-fu   { font-size:11px; font-weight:600; margin-top:3px; }
    .tm-item-fu.ov   { color:var(--danger); }
    .tm-item-fu.td   { color:#f59e0b; }
    .tm-item-fu.ok   { color:#16a34a; }
    .tm-item-fu.none { color:var(--muted); }

    /* Right panel */
    .tm-right  { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
    .tm-detail { flex:1; overflow-y:auto; padding:18px 22px; }

    /* Detail */
    .d-head { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; gap:12px; flex-wrap:wrap; }
    .d-name { font-size:20px; font-weight:700; }
    .d-co   { font-size:13px; color:var(--muted); margin-top:2px; }
    .d-actions { display:flex; gap:6px; flex-wrap:wrap; }
    .d-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
    .d-field { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 12px; }
    .d-field-label { font-size:10px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.4px; margin-bottom:3px; }
    .d-field-val   { font-size:13px; }
    .d-field-val a { color:var(--text); text-decoration:none; }
    .d-field-val a:hover { color:var(--primary); }
    .d-sec-title { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
    .d-req { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:13px; line-height:1.5; min-height:36px; margin-bottom:14px; }
    .d-req.empty { color:var(--muted); font-style:italic; }

    /* Timeline */
    .tl-compose { display:flex; gap:6px; margin-bottom:10px; align-items:flex-start; }
    .tl-compose select { border:1px solid var(--border); border-radius:8px; padding:6px 7px; font-size:12px; font-family:inherit; outline:none; background:var(--card); color:var(--text); }
    .tl-compose textarea { flex:1; border:1px solid var(--border); border-radius:8px; padding:7px 10px; font-size:12px; font-family:inherit; resize:none; height:52px; outline:none; background:var(--card); color:var(--text); }
    .tl-compose textarea:focus { border-color:var(--primary); }
    .tl-item { display:flex; gap:7px; margin-bottom:7px; }
    .tl-av { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; flex-shrink:0; background:#6366f1; margin-top:1px; }
    .tl-av.sys { background:#e2e8f0; color:#64748b; }
    .tl-meta { font-size:10px; color:var(--muted); margin-bottom:2px; }
    .tl-note { font-size:12px; line-height:1.4; background:var(--card); border:1px solid var(--border); border-radius:6px; padding:5px 9px; }
    .tl-note.sys { background:transparent; border:none; padding:0; color:var(--muted); font-size:11px; }

    /* Badges */
    .s-badge { display:inline-flex; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
    .s-lead      { background:#fef9c3; color:#854d0e; }
    .s-contacted { background:#dbeafe; color:#1d4ed8; }
    .s-noresp    { background:#ffedd5; color:#c2410c; }
    .s-onboarded { background:#dcfce7; color:#15803d; }

    /* Modals */
    .qn-overlay,.fu-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:200; opacity:0; pointer-events:none; transition:opacity .15s; }
    .qn-overlay.open,.fu-overlay.open { opacity:1; pointer-events:all; }
    .qn-box,.fu-box { background:var(--surface); border-radius:14px; padding:22px; max-width:96vw; }
    .qn-box { width:420px; }
    .fu-box { width:320px; }
    .qn-box h4,.fu-box h4 { font-size:15px; font-weight:600; margin-bottom:12px; }
    .qn-box select,.qn-box textarea { width:100%; border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:13px; font-family:inherit; margin-bottom:9px; outline:none; background:var(--card); color:var(--text); }
    .qn-box textarea { resize:none; min-height:80px; }
    .qd-row { display:flex; gap:6px; margin:8px 0; flex-wrap:wrap; }
    .qd { padding:4px 10px; border:1px solid var(--border); border-radius:7px; font-size:12px; cursor:pointer; background:var(--bg); font-family:inherit; color:var(--text); }
    .qd:hover { background:var(--primary); color:#fff; border-color:var(--primary); }

    .btn-green { background:#dcfce7; color:#15803d; border:1px solid #bbf7d0; }
    .btn-green:hover { background:#bbf7d0; }
    .btn-amber { background:#fef9c3; color:#854d0e; border:1px solid #fef08a; }
    .btn-amber:hover { background:#fef08a; }
    .nav-sec { padding:10px 12px 4px; font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.7px; }
  </style>
</head>

<div class="main" style="padding:0;overflow:hidden">
  <div class="topbar" style="flex-shrink:0">
    <h2 id="pageTitle">Dashboard</h2>
    <div class="topbar-actions">
      <button class="btn btn-outline btn-sm" onclick="showBrief()">🤖 Brief</button>
      <button class="btn btn-outline btn-sm" onclick="location.reload()">↻ Refresh</button>
      <a href="customers.html" class="btn btn-outline btn-sm">Full CRM</a>
    </div>
  </div>

  <div class="tm-wrap">
    <!-- LEFT: customer list -->
    <div class="tm-left">
      <div class="tm-left-head">
        <div class="tm-person" id="tmPerson">—</div>
        <div class="tm-date"   id="tmDate"></div>
        <div class="tm-stats">
          <div class="tm-stat danger"><div class="tm-stat-v" id="stOv">—</div><div class="tm-stat-l">Overdue</div></div>
          <div class="tm-stat warn">  <div class="tm-stat-v" id="stTd">—</div><div class="tm-stat-l">Today</div></div>
          <div class="tm-stat">       <div class="tm-stat-v" id="stTot">—</div><div class="tm-stat-l">Total</div></div>
          <div class="tm-stat ok">    <div class="tm-stat-v" id="stOn">—</div><div class="tm-stat-l">Onboarded</div></div>
        </div>
      </div>

      <div class="tm-search-bar">
        <input type="text" id="tmSearch" placeholder="Search name, phone, email, company, city…" oninput="renderList()" />
      </div>
      <div class="tm-filter-tabs" id="filterTabs"></div>
      <div class="tm-list" id="tmList">
        <div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">Loading…</div>
      </div>
    </div>

    <!-- RIGHT: AI brief (default) + customer detail -->
    <div class="tm-right">
      <!-- AI Brief view -->
      <div class="tm-brief-view" id="tmBriefView">
        <div class="brief-rh">
          <div>
            <div class="brief-rh-title">🤖 AI Daily Brief</div>
            <div class="brief-rh-ts" id="briefTimestamp">—</div>
          </div>
          <div class="brief-rh-actions">
            <button class="btn btn-outline btn-sm" id="briefRefreshBtn" onclick="loadBrief()">🔄 Refresh</button>
          </div>
        </div>
        <div class="brief-body" id="briefBody">
          <div class="brief-empty">Click <strong>🔄 Refresh</strong> to generate your daily brief.</div>
        </div>
      </div>
      <!-- Customer detail view (hidden by default) -->
      <div class="tm-detail" id="tmDetail" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Quick note modal -->
<div class="qn-overlay" id="qnModal">
  <div class="qn-box">
    <h4 id="qnTitle">Add Note</h4>
    <select id="qnType"><option value="call">📞 Call</option><option value="note">📝 Note</option><option value="meeting">🤝 Meeting</option><option value="message">💬 Message</option></select>
    <textarea id="qnText" placeholder="What happened? Next steps?…"></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeQN()">Cancel</button>
      <button class="btn btn-primary" onclick="saveQN()">Save Note</button>
    </div>
  </div>
</div>

<!-- Follow-up modal -->
<div class="fu-overlay" id="fuModal">
  <div class="fu-box">
    <h4>Set Next Follow-up</h4>
    <input type="date" id="fuDate" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;margin-bottom:6px;outline:none;background:var(--card);color:var(--text)" />
    <div class="qd-row">
      <button class="qd" onclick="setFUDays(1)">+1 day</button>
      <button class="qd" onclick="setFUDays(3)">+3 days</button>
      <button class="qd" onclick="setFUDays(7)">+1 week</button>
      <button class="qd" onclick="setFUDays(14)">+2 weeks</button>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-outline" onclick="closeFU()">Skip</button>
      <button class="btn btn-primary" onclick="saveFU()">Set Date</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const PERSON = new URLSearchParams(location.search).get('name') || 'Rohan';
const S_MAP  = { Lead:'s-lead', Contacted:'s-contacted', 'Contacted but No Response':'s-noresp', Onboarded:'s-onboarded' };
let mine = [], selCust = null, selId = null, tabFilter = 'All', qnActiveCid = null, fuActiveCid = null;

async function init() {
  document.title = PERSON + "'s Dashboard — Arambhika";
  document.getElementById('pageTitle').textContent = PERSON + "'s Dashboard";
  document.getElementById('tmPerson').textContent  = PERSON;
  document.getElementById('tmDate').textContent    = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
  ['navRohan','navSaurabh'].forEach(id => {
    const el = document.getElementById(id);
    if (el && el.textContent.trim() === PERSON) el.classList.add('active');
  });
  const r = await fetch('/api/crm/customers');
  const all = (await r.json()).data || [];
  mine = all.filter(c => (c.assigned_to||'').trim() === PERSON);
  renderStats(); buildFilterTabs(); renderList();
  // Load last stored brief from localStorage
  loadStoredBrief();
}

function todayISO() { return new Date().toISOString().split('T')[0]; }

function renderStats() {
  const t = todayISO();
  document.getElementById('stOv').textContent  = mine.filter(c=>c.next_followup&&c.next_followup<t).length;
  document.getElementById('stTd').textContent  = mine.filter(c=>c.next_followup===t).length;
  document.getElementById('stTot').textContent = mine.length;
  document.getElementById('stOn').textContent  = mine.filter(c=>c.status==='Onboarded').length;
}

function buildFilterTabs() {
  const statuses = ['All',...new Set(mine.map(c=>c.status).filter(Boolean))];
  const el = document.getElementById('filterTabs');
  el.innerHTML = statuses.map(s=>`<span class="tm-tab${s==='All'?' on':''}" onclick="setTab(this,'${s.replace(/'/g,"\\'")}' )">${s}</span>`).join('')
    + '<span class="tm-tab" onclick="setTab(this,\'overdue\')">⚠ Overdue</span>'
    + '<span class="tm-tab" onclick="setTab(this,\'today\')">📅 Today</span>'
    + '<span class="tm-tab" onclick="setTab(this,\'nodate\')">⏰ No Date</span>';
}

function setTab(el, val) {
  document.querySelectorAll('.tm-tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on'); tabFilter=val; renderList();
}

function renderList() {
  const q = (document.getElementById('tmSearch').value||'').toLowerCase();
  const t = todayISO();
  let list = mine;
  if      (tabFilter==='overdue') list=list.filter(c=>c.next_followup&&c.next_followup<t);
  else if (tabFilter==='today')   list=list.filter(c=>c.next_followup===t);
  else if (tabFilter==='nodate')  list=list.filter(c=>!c.next_followup&&c.status!=='Onboarded');
  else if (tabFilter!=='All')     list=list.filter(c=>c.status===tabFilter);
  if (q) list=list.filter(c=>[c.name,c.company,c.phone,c.email,c.city,c.state,c.gst_number,c.source,c.requirement].join(' ').toLowerCase().includes(q));
  list.sort((a,b)=>{
    const rank=x=>!x.next_followup?3:x.next_followup<t?0:x.next_followup===t?1:2;
    return rank(a)-rank(b)||(a.next_followup||'9').localeCompare(b.next_followup||'9');
  });
  const el = document.getElementById('tmList');
  if (!list.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">No customers match</div>';return;}
  el.innerHTML = list.map(c=>{
    const ov=c.next_followup&&c.next_followup<t, td=c.next_followup===t;
    const fuLabel=c.next_followup?(ov?`⚠ ${fmtD(c.next_followup)}`:(td?'📅 Today':fmtD(c.next_followup))):'No follow-up set';
    const fuCls=!c.next_followup?'none':ov?'ov':td?'td':'ok';
    return `<div class="tm-item${selId===c.id?' active':''}" id="li-${c.id}" onclick="selectC(${c.id})">
      <div class="tm-item-name">${esc(c.name)}<span class="s-badge ${S_MAP[c.status]||''}" style="margin-left:6px">${c.status||'—'}</span></div>
      <div class="tm-item-sub">${[c.company,c.phone].filter(Boolean).map(esc).join(' · ')}</div>
      <div class="tm-item-fu ${fuCls}">${fuLabel}</div>
    </div>`;
  }).join('');
}

async function selectC(id) {
  selId=id;
  document.querySelectorAll('.tm-item').forEach(el=>el.classList.remove('active'));
  const li=document.getElementById('li-'+id); if(li) li.classList.add('active');
  document.getElementById('tmBriefView').style.display='none';
  const detail=document.getElementById('tmDetail');
  detail.style.display='block';
  detail.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">Loading…</div>';
  const r=await fetch(`/api/crm/customers/${id}`);
  selCust=await r.json();
  renderDetail();
}

function showBrief() {
  selId=null; selCust=null;
  document.querySelectorAll('.tm-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('tmDetail').style.display='none';
  document.getElementById('tmBriefView').style.display='flex';
}

function renderDetail() {
  const c=selCust, t=todayISO();
  const ov=c.next_followup&&c.next_followup<t, td=c.next_followup===t;
  const discs=(c.discussions||[]).slice(0,20);
  const tlHtml=discs.length?discs.map(d=>{
    const sys=d.type==='activity';
    return `<div class="tl-item">
      <div class="tl-av${sys?' sys':''}">${sys?'⚡':(d.author||'?')[0].toUpperCase()}</div>
      <div style="flex:1">
        <div class="tl-meta">${sys?'':esc(d.author||'Team')+' · '}${ago(d.created_at)}</div>
        <div class="tl-note${sys?' sys':''}">${esc(d.note)}</div>
      </div>
    </div>`;
  }).join(''):'<div style="color:var(--muted);font-size:12px">No activity yet</div>';

  document.getElementById('tmDetail').innerHTML=`
    <button class="detail-back" onclick="showBrief()">← Back to Brief</button>
    <div class="d-head">
      <div>
        <div class="d-name">${esc(c.name)}</div>
        <div class="d-co">${[c.company,c.city,c.state].filter(Boolean).map(esc).join(' · ')||'—'}</div>
      </div>
      <div class="d-actions">
        <button class="btn btn-green btn-sm" onclick="markCalled(${c.id})">✓ Called</button>
        <button class="btn btn-amber btn-sm" onclick="markNoAnswer(${c.id})">📵 No Answer</button>
        <button class="btn btn-outline btn-sm" onclick="openQN(${c.id},'${esc(c.name).replace(/'/g,"\\'")}')">📝 Note</button>
        <button class="btn btn-outline btn-sm" onclick="openFU(${c.id})">📅 Follow-up</button>
        <a href="customers.html?id=${c.id}" class="btn btn-outline btn-sm" target="_blank">↗ Full Profile</a>
      </div>
    </div>
    <div class="d-grid">
      <div class="d-field"><div class="d-field-label">Status</div><div class="d-field-val"><span class="s-badge ${S_MAP[c.status]||''}">${esc(c.status||'—')}</span></div></div>
      <div class="d-field"><div class="d-field-label">Follow-up</div><div class="d-field-val" style="color:${ov?'var(--danger)':td?'#f59e0b':'inherit'};font-weight:${ov||td?600:400}">${c.next_followup?(ov?'⚠ Overdue — ':td?'📅 Today — ':'')+fmtD(c.next_followup):'<span style="color:var(--muted)">Not set</span>'}</div></div>
      <div class="d-field"><div class="d-field-label">Phone</div><div class="d-field-val">${c.phone?`<a href="tel:${esc(c.phone)}">${esc(c.phone)}</a>`:'<span style="color:var(--muted)">—</span>'}</div></div>
      <div class="d-field"><div class="d-field-label">Email</div><div class="d-field-val">${c.email?`<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>`:'<span style="color:var(--muted)">—</span>'}</div></div>
      <div class="d-field"><div class="d-field-label">Source</div><div class="d-field-val">${esc(c.source||'—')}</div></div>
      <div class="d-field"><div class="d-field-label">Customer Type</div><div class="d-field-val">${esc(c.customer_type||'—')}</div></div>
    </div>
    <div class="d-sec-title">Requirement / Details</div>
    <div class="d-req${c.requirement?'':' empty'}">${c.requirement?esc(c.requirement).replace(/\n/g,'<br>'):'No details added yet'}</div>
    <div class="d-sec-title">Timeline — Activity &amp; Notes</div>
    <div class="tl-compose">
      <select id="d-nt"><option value="call">📞</option><option value="note">📝</option><option value="meeting">🤝</option><option value="message">💬</option></select>
      <textarea id="d-ntxt" placeholder="Add a note…"></textarea>
      <button class="btn btn-primary btn-sm" onclick="saveInlineNote(${c.id})" style="align-self:flex-end">Save</button>
    </div>
    <div id="d-tl">${tlHtml}</div>`;
}

async function saveInlineNote(cid) {
  const text=document.getElementById('d-ntxt').value.trim();
  if(!text)return toast('Write something first','error');
  const type=document.getElementById('d-nt').value;
  const r=await fetch(`/api/crm/customers/${cid}/discussions`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note:text,author:PERSON,type})});
  const d=await r.json();
  document.getElementById('d-ntxt').value='';
  if(!selCust.discussions)selCust.discussions=[];
  selCust.discussions.unshift({id:d.id,note:text,author:PERSON,type,created_at:new Date().toISOString()});
  const tl=document.getElementById('d-tl');
  if(tl)tl.insertAdjacentHTML('afterbegin',`<div class="tl-item"><div class="tl-av">${PERSON[0]}</div><div style="flex:1"><div class="tl-meta">${esc(PERSON)} · just now</div><div class="tl-note">${esc(text)}</div></div></div>`);
  toast('Note saved','success');
}

async function markCalled(cid) {
  const dt=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  await fetch(`/api/crm/customers/${cid}/discussions`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note:`Called on ${dt}.`,author:PERSON,type:'call'})});
  await patchC(cid,{status:'Contacted'});
  updateMine(cid,{status:'Contacted'}); renderStats(); renderList();
  if(selCust&&selCust.id===cid){selCust.status='Contacted'; renderDetail();}
  toast('Marked as Called','success'); openFU(cid);
}
async function markNoAnswer(cid) {
  const dt=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  await fetch(`/api/crm/customers/${cid}/discussions`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note:`Called on ${dt} — no answer.`,author:PERSON,type:'call'})});
  await patchC(cid,{status:'Contacted but No Response'});
  updateMine(cid,{status:'Contacted but No Response'}); renderStats(); renderList();
  if(selCust&&selCust.id===cid){selCust.status='Contacted but No Response'; renderDetail();}
  toast('No answer recorded','success'); openFU(cid);
}
function updateMine(cid,fields){const i=mine.findIndex(c=>c.id===cid);if(i>-1)Object.assign(mine[i],fields);}
async function patchC(cid,fields){
  const r=await fetch(`/api/crm/customers/${cid}`);const c=await r.json();
  const body={...c,...fields};delete body.discussions;delete body.interests;
  await fetch(`/api/crm/customers/${cid}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  updateMine(cid,fields);
}

function openQN(cid,name){qnActiveCid=cid;document.getElementById('qnTitle').textContent='Note — '+name;document.getElementById('qnText').value='';document.getElementById('qnModal').classList.add('open');setTimeout(()=>document.getElementById('qnText').focus(),100);}
function closeQN(){document.getElementById('qnModal').classList.remove('open');}
async function saveQN(){
  const note=document.getElementById('qnText').value.trim();if(!note)return toast('Write a note','error');
  const type=document.getElementById('qnType').value;
  await fetch(`/api/crm/customers/${qnActiveCid}/discussions`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note,author:PERSON,type})});
  closeQN();toast('Note saved','success');
  if(selCust&&selCust.id===qnActiveCid){if(!selCust.discussions)selCust.discussions=[];selCust.discussions.unshift({note,author:PERSON,type,created_at:new Date().toISOString()});renderDetail();}
}

function openFU(cid){fuActiveCid=cid;document.getElementById('fuDate').value='';document.getElementById('fuModal').classList.add('open');}
function closeFU(){document.getElementById('fuModal').classList.remove('open');fuActiveCid=null;}
function setFUDays(n){const d=new Date();d.setDate(d.getDate()+n);document.getElementById('fuDate').value=d.toISOString().split('T')[0];}
async function saveFU(){
  const date=document.getElementById('fuDate').value;if(!date)return closeFU();
  await patchC(fuActiveCid,{next_followup:date});
  if(selCust&&selCust.id===fuActiveCid){selCust.next_followup=date;}
  closeFU();renderStats();renderList();if(selCust&&selCust.id===fuActiveCid)renderDetail();
  toast('Follow-up date set','success');
}

function loadStoredBrief() {
  const stored = localStorage.getItem('brief_' + PERSON);
  if (!stored) return;
  try {
    const {text, ts} = JSON.parse(stored);
    renderBriefContent(text, ts);
  } catch(e) {}
}

function renderBriefContent(text, ts) {
  const body = document.getElementById('briefBody');
  const tsEl = document.getElementById('briefTimestamp');
  if (ts) {
    const d = new Date(ts);
    tsEl.textContent = 'Last generated: ' + d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) + ' at ' + d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  }
  body.innerHTML = `<div class="brief-content">${esc(text).replace(/\n/g,'<br>')}</div>`;
}

async function loadBrief() {
  const btn = document.getElementById('briefRefreshBtn');
  const body = document.getElementById('briefBody');
  // Switch to brief view if on customer detail
  showBrief();
  body.innerHTML = '<div class="brief-loading">⏳ Generating your daily brief…</div>';
  document.getElementById('briefTimestamp').textContent = 'Generating…';
  btn.disabled = true; btn.textContent = '⏳ Loading…';
  try {
    const r = await fetch('/api/ai/daily-brief',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({person:PERSON})});
    const d = await r.json();
    const text = d.brief || d.error || 'No brief generated.';
    const ts = new Date().toISOString();
    localStorage.setItem('brief_' + PERSON, JSON.stringify({text, ts}));
    renderBriefContent(text, ts);
    if (d.stats) {
      document.getElementById('stOv').textContent = d.stats.overdue;
      document.getElementById('stTd').textContent = d.stats.dueToday;
    }
  } catch(e) {
    body.innerHTML = `<div class="brief-empty">Could not load brief: ${esc(e.message)}</div>`;
    document.getElementById('briefTimestamp').textContent = '—';
  }
  btn.disabled = false; btn.textContent = '🔄 Refresh';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtD(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return`${parseInt(d)} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]} ${y}`;}
function ago(ts){if(!ts)return'';const m=Math.floor((Date.now()-new Date(ts).getTime())/60000);if(m<1)return'just now';if(m<60)return`${m}m ago`;const h=Math.floor(m/60);if(h<24)return`${h}h ago`;const d=Math.floor(h/24);return d<30?`${d}d ago`:fmtD((ts+'').split('T')[0]);}
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className=type?`show ${type}`:'show';setTimeout(()=>el.className='',3500);}

document.getElementById('qnModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeQN();});
document.getElementById('fuModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeFU();});
init();
</script>
<script src="js/nav.js"></script>
</body>
</html>
