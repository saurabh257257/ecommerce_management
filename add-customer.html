<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Customer — Arambhika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --primary:#6366f1; --primary-dark:#4f46e5; --bg:#f8fafc; --card:#fff; --border:#e2e8f0; --text:#1e293b; --muted:#94a3b8; --success:#16a34a; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .page-head { background:var(--card); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; }
    .page-head-logo { font-size:18px; font-weight:800; color:var(--primary); }
    .page-head-sub { font-size:12px; color:var(--muted); }
    .page-head a { font-size:13px; color:var(--primary); text-decoration:none; font-weight:600; }
    .container { max-width:520px; margin:0 auto; padding:24px 16px 48px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:16px; }
    .card-title { font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:14px; }
    .field { width:100%; border:1px solid var(--border); border-radius:9px; padding:10px 13px; font-size:14px; font-family:inherit; outline:none; background:var(--bg); color:var(--text); margin-bottom:10px; }
    .field:focus { border-color:var(--primary); background:#fff; }
    select.field { cursor:pointer; }
    textarea.field { height:80px; resize:vertical; }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
    .field-row .field { margin-bottom:0; }
    .save-btn { width:100%; padding:14px; border-radius:11px; border:none; background:var(--primary); color:#fff; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:8px; transition:background .15s; }
    .save-btn:hover { background:var(--primary-dark); }
    .save-btn:disabled { opacity:.5; cursor:default; }
    .wa-btn { width:100%; padding:12px; border-radius:11px; border:none; background:#25d366; color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:8px; display:flex; align-items:center; justify-content:center; gap:8px; }
    .wa-btn:hover { background:#1ebe5d; }
    .success-screen { display:none; text-align:center; padding:48px 24px; }
    .success-title { font-size:22px; font-weight:800; margin-bottom:8px; color:var(--success); }
    .success-sub { font-size:14px; color:var(--muted); margin-bottom:28px; line-height:1.6; }
    .btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .btn-outline { padding:12px 28px; border-radius:10px; border:2px solid var(--primary); background:none; color:var(--primary); font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; text-decoration:none; }
    .btn-outline:hover { background:var(--primary); color:#fff; }
    @media(max-width:600px) { .field-row { grid-template-columns:1fr; } }
  </style>
</head>
<body>

<div class="page-head">
  <div><div class="page-head-logo">Arambhika</div><div class="page-head-sub">Add New Customer</div></div>
  <a href="crm.html">Back to CRM</a>
</div>

<div class="container">
  <div id="mainForm">
    <div class="card">
      <div class="card-title">Customer Details</div>
      <input type="text" class="field" id="fName" placeholder="Name *" autofocus />
      <input type="text" class="field" id="fCompany" placeholder="Company" />
      <div class="field-row">
        <input type="tel" class="field" id="fPhone" placeholder="Phone *" />
        <input type="email" class="field" id="fEmail" placeholder="Email" />
      </div>
      <div class="field-row">
        <select class="field" id="fType">
          <option value="Battery Manufacturer">Battery Manufacturer</option>
          <option value="Trader">Trader</option>
          <option value="Others" selected>Others</option>
        </select>
        <select class="field" id="fStatus">
          <option value="Lead" selected>Lead</option>
          <option value="Contacted but No Response">Contacted but No Response</option>
          <option value="Onboarded">Onboarded</option>
        </select>
      </div>
      <div class="field-row">
        <input type="text" class="field" id="fCity" placeholder="City" />
        <input type="text" class="field" id="fState" placeholder="State" />
      </div>
      <input type="text" class="field" id="fSource" placeholder="Source / Reference" />
      <input type="text" class="field" id="fGst" placeholder="GST Number" />
      <textarea class="field" id="fReq" placeholder="Requirement / Notes..."></textarea>
      <button class="save-btn" id="saveBtn" onclick="doSave()">Save Customer</button>
      <button class="wa-btn" onclick="openWA()" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        WhatsApp
      </button>
    </div>
  </div>

  <div class="success-screen" id="successScreen">
    <div class="success-title" id="successName">Customer Added!</div>
    <div class="success-sub" id="successSub"></div>
    <div class="btn-row">
      <button class="btn-outline" onclick="resetAll()">+ Add Another</button>
      <a href="crm.html" class="btn-outline">Go to CRM</a>
      <button class="wa-btn" style="width:auto;padding:12px 24px;margin:0" onclick="openWA()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        WhatsApp
      </button>
    </div>
  </div>
</div>

<script>
let savedPhone = '';

async function doSave() {
  const name = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim().replace(/\D/g,'');
  if (!name) { document.getElementById('fName').focus(); document.getElementById('fName').style.borderColor='#ef4444'; return; }
  if (phone.length < 10) { document.getElementById('fPhone').focus(); document.getElementById('fPhone').style.borderColor='#ef4444'; return; }
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  const body = {
    name,
    company: document.getElementById('fCompany').value.trim(),
    phone: phone.slice(-10),
    email: document.getElementById('fEmail').value.trim(),
    customer_type: document.getElementById('fType').value,
    status: document.getElementById('fStatus').value,
    city: document.getElementById('fCity').value.trim(),
    state: document.getElementById('fState').value.trim(),
    source: document.getElementById('fSource').value.trim(),
    gst_number: document.getElementById('fGst').value.trim(),
    requirement: document.getElementById('fReq').value.trim(),
    country: 'India'
  };
  try {
    const r = await fetch('/api/crm/customers', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const d = await r.json();
    if (!d.success) throw new Error('Save failed');
    savedPhone = phone.slice(-10);
    document.getElementById('successName').textContent = name + ' added!';
    document.getElementById('successSub').textContent = `${body.customer_type} | ${body.status} | ${body.source||'No source'}`;
    document.getElementById('mainForm').style.display = 'none';
    document.getElementById('successScreen').style.display = 'block';
    window.scrollTo({top:0,behavior:'smooth'});
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Save Customer';
    alert('Could not save: ' + e.message);
  }
}

function openWA() {
  const phone = savedPhone || document.getElementById('fPhone').value.trim().replace(/\D/g,'');
  if (phone.length < 10) { alert('Enter a phone number first'); return; }
  window.open('https://wa.me/91' + phone.slice(-10), '_blank');
}

function resetAll() {
  savedPhone = '';
  document.getElementById('mainForm').style.display = 'block';
  document.getElementById('successScreen').style.display = 'none';
  ['fName','fCompany','fPhone','fEmail','fCity','fState','fSource','fGst','fReq'].forEach(id => {
    const el = document.getElementById(id);
    el.value = ''; el.style.borderColor = '';
  });
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('saveBtn').textContent = 'Save Customer';
  document.getElementById('fName').focus();
}
</script>
</body>
</html>
