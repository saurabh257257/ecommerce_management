<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arambhika Enablers — Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .table-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .tab-btn { padding:8px 16px; border:1px solid var(--border); border-radius:8px; background:var(--surface);
      cursor:pointer; font-size:13px; font-weight:500; color:var(--muted); transition:all .15s; }
    .tab-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .tab-btn .count { font-size:11px; opacity:.75; margin-left:4px; }
    .db-table-wrap { overflow-x:auto; }
    .db-table { min-width:100%; }
    .db-table th { font-size:11px; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }
    .db-table td { font-size:12px; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pagination { display:flex; align-items:center; gap:8px; padding:12px 0; }
    .pagination button { padding:5px 12px; border:1px solid var(--border); border-radius:6px; background:var(--surface); cursor:pointer; font-size:13px; }
    .pagination button:disabled { opacity:.4; cursor:not-allowed; }
    .pagination button.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .page-info { font-size:13px; color:var(--muted); margin:0 4px; }
    .query-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:12px; }
    .query-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; }
    .query-card h4 { margin:0 0 4px; font-size:14px; }
    .query-card p { margin:0 0 12px; font-size:12px; color:var(--muted); }
    .query-card .q-actions { display:flex; gap:8px; }
    .run-result { margin-top:16px; overflow-x:auto; }
    .run-result table { min-width:100%; font-size:12px; }
  </style>
</head>

<div class="main">
  <div class="topbar">
    <h2>Database Viewer</h2>
    <div class="topbar-actions">
      <a href="/api/download/customers.csv" class="btn btn-outline btn-sm">Export Customers</a>
      <a href="/api/download/products.csv" class="btn btn-primary btn-sm">Export Products SKU</a>
    </div>
  </div>

  <div class="content">

    <!-- Frequent Queries -->
    <div class="card" style="margin-bottom:24px">
      <div class="card-header"><h3>Frequent Queries</h3></div>
      <div style="padding:16px 20px">
        <div class="query-grid" id="queryGrid">Loading…</div>
      </div>
      <div id="queryResult" style="display:none;padding:0 20px 16px">
        <div class="card-header" style="padding:0;margin-bottom:12px">
          <h3 id="queryResultTitle">Results</h3>
          <button class="btn btn-outline btn-sm" onclick="closeQueryResult()">Close</button>
        </div>
        <div class="run-result" id="queryResultTable"></div>
      </div>
    </div>

    <!-- Table Viewer -->
    <div class="card">
      <div class="card-header"><h3>Tables</h3></div>
      <div style="padding:16px 20px">
        <div class="table-tabs" id="tableTabs">Loading…</div>
        <div id="tableContent">
          <div style="color:var(--muted);font-size:13px;padding:20px 0">Select a table to view its data</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const QUERIES = [
  { name: 'due-today', label: 'Due Today', desc: 'Customers with follow-up scheduled for today', color: '#4f46e5' },
  { name: 'overdue', label: 'Overdue', desc: 'Customers whose follow-up date has passed', color: '#dc2626' },
  { name: 'unassigned', label: 'Unassigned', desc: 'Customers not yet assigned to a team member', color: '#f59e0b' },
  { name: 'no-response', label: 'No Response', desc: 'Customers marked as Contacted but No Response', color: '#f97316' },
  { name: 'onboarded', label: 'Onboarded', desc: 'Successfully onboarded customers', color: '#22c55e' },
  { name: 'leads', label: 'All Leads', desc: 'All customers with status Lead', color: '#6b7280' },
];

let tables = [], activeTable = '', page = 1, totalPages = 1;

async function init() {
  // Render query cards
  document.getElementById('queryGrid').innerHTML = QUERIES.map(q => `
    <div class="query-card">
      <h4 style="color:${q.color}">${q.label}</h4>
      <p>${q.desc}</p>
      <div class="q-actions">
        <button class="btn btn-outline btn-sm" onclick="runQuery('${q.name}','${q.label}')">Run</button>
        <a class="btn btn-outline btn-sm" href="/api/download/query/${q.name}">Download CSV</a>
      </div>
    </div>`).join('');

  // Load tables
  const res = await fetch('/api/tables');
  const data = await res.json();
  tables = data.data;
  document.getElementById('tableTabs').innerHTML = tables.map(t => `
    <button class="tab-btn" onclick="loadTable('${t.name}')" id="tab-${t.name}">
      ${t.name} <span class="count">(${t.count.toLocaleString()})</span>
    </button>`).join('');
}

async function runQuery(name, label) {
  const resEl = document.getElementById('queryResult');
  const tableEl = document.getElementById('queryResultTable');
  const titleEl = document.getElementById('queryResultTitle');
  resEl.style.display = 'block';
  titleEl.textContent = label + ' — loading…';
  tableEl.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0">Loading…</div>';
  resEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  try {
    const res = await fetch(`/api/download/query/${name}`, { headers: { Accept: 'text/csv' } });
    const text = await res.text();
    const lines = text.trim().split('\r\n').filter(Boolean);
    if (lines.length <= 1) { tableEl.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0">No results</div>'; titleEl.textContent = label + ' (0 rows)'; return; }
    const headers = lines[0].split(',');
    const rows = lines.slice(1).map(l => l.split(','));
    titleEl.textContent = `${label} (${rows.length} rows)`;
    tableEl.innerHTML = `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${
      rows.map(r => `<tr>${r.map(c => `<td title="${c}">${c}</td>`).join('')}</tr>`).join('')
    }</tbody></table>`;
  } catch(e) {
    tableEl.innerHTML = `<div style="color:var(--danger);font-size:13px">${e.message}</div>`;
  }
}

function closeQueryResult() {
  document.getElementById('queryResult').style.display = 'none';
}

async function loadTable(name, pg = 1) {
  // Update active tab
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tab = document.getElementById('tab-' + name);
  if (tab) tab.classList.add('active');
  activeTable = name;
  page = pg;

  document.getElementById('tableContent').innerHTML = '<div style="color:var(--muted);font-size:13px;padding:20px 0">Loading…</div>';

  try {
    const res = await fetch(`/api/tables/${name}?page=${pg}&limit=50`);
    const data = await res.json();
    totalPages = data.pages;

    const cols = data.data.length ? Object.keys(data.data[0]) : [];
    const paginationHtml = totalPages > 1 ? `
      <div class="pagination">
        <button onclick="loadTable('${name}',${pg-1})" ${pg<=1?'disabled':''}>&#8592; Prev</button>
        <span class="page-info">Page ${pg} of ${totalPages} &nbsp;(${data.total.toLocaleString()} rows)</span>
        <button onclick="loadTable('${name}',${pg+1})" ${pg>=totalPages?'disabled':''}>Next &#8594;</button>
      </div>` : `<div class="page-info" style="padding:10px 0;font-size:12px">${data.total.toLocaleString()} rows</div>`;

    if (!data.data.length) {
      document.getElementById('tableContent').innerHTML = '<div style="color:var(--muted);font-size:13px;padding:20px 0">Table is empty</div>';
      return;
    }

    document.getElementById('tableContent').innerHTML = `
      ${paginationHtml}
      <div class="db-table-wrap">
        <table class="db-table">
          <thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
          <tbody>${data.data.map(row => `<tr>${cols.map(c => {
            const v = row[c] ?? '';
            const str = String(v).length > 60 ? String(v).slice(0,60)+'…' : String(v);
            return `<td title="${String(v).replace(/"/g,'&quot;')}">${str}</td>`;
          }).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>
      ${paginationHtml}`;
  } catch(e) {
    document.getElementById('tableContent').innerHTML = `<div style="color:var(--danger);font-size:13px">${e.message}</div>`;
  }
}

init();
</script>
<script src="js/nav.js"></script>
</body>
