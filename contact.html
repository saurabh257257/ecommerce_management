<html lang="en">
<head>

  <title>Add Contact — Arambhika Enablers</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    .contact-form { max-width: 480px; margin: 0 auto; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; color: var(--text); background: var(--card); outline: none; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-actions { display: flex; gap: 10px; margin-top: 24px; }
    .form-actions .btn { flex: 1; justify-content: center; padding: 12px; font-size: 15px; }
    .wa-btn { background: #25d366; color: #fff; border: none; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
    .wa-btn:hover { background: #1ebe5d; }
    .success-msg { display: none; text-align: center; padding: 40px 20px; }
    .success-msg h3 { font-size: 20px; margin-bottom: 8px; color: #16a34a; }
    .success-msg p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>

<div class="sidebar-overlay" id="sbOverlay" onclick="document.querySelector('.sidebar').classList.remove('open');this.classList.remove('show')"></div>

<div class="main">
  <div class="topbar">
    <button class="hamburger" id="hbBtn" onclick="document.querySelector('.sidebar').classList.toggle('open');document.getElementById('sbOverlay').classList.toggle('show')" aria-label="Menu"><span></span><span></span><span></span></button>
    <h2>Add Contact</h2>
    <div class="topbar-actions">
      <button class="btn btn-outline btn-sm" onclick="sessionStorage.removeItem('arambhika_auth');location.replace('login.html');" title="Sign out">Logout</button>
    </div>
  </div>
  <div class="content">

    <div class="contact-form" id="formWrap">
      <div class="form-group">
        <label>Name *</label>
        <input type="text" id="cName" placeholder="Contact or company name" autofocus />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone *</label>
          <input type="tel" id="cPhone" placeholder="10-digit mobile" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="cEmail" placeholder="email@example.com" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Customer Type</label>
          <select id="cType">
            <option value="Battery Manufacturer">Battery Manufacturer</option>
            <option value="Retailer">Retailer</option>
            <option value="Trader">Trader</option>
            <option value="Others" selected>Others</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="cStatus">
            <option value="Lead" selected>Lead</option>
            <option value="Contacted but No Response">Contacted but No Response</option>
            <option value="Onboarded">Onboarded</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>State</label>
          <input type="text" id="cState" placeholder="e.g. Maharashtra" />
        </div>
        <div class="form-group">
          <label>City</label>
          <input type="text" id="cCity" placeholder="e.g. Mumbai" />
        </div>
      </div>
      <div class="form-group">
        <label>Source / Reference</label>
        <input type="text" id="cSource" placeholder="How did you find this contact?" />
      </div>
      <div class="form-group">
        <label>Remark</label>
        <textarea id="cRemark" placeholder="Any notes about this contact..."></textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveContact()">Save Contact</button>
        <button class="btn wa-btn" id="waBtn" onclick="openWhatsApp()" title="Open WhatsApp chat">

    <div class="success-msg" id="successMsg">
      <h3>Contact Saved!</h3>
      <p id="successText"></p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-primary" onclick="resetForm()">Add Another</button>
        <a href="crm.html" class="btn btn-outline">Go to CRM</a>
        <button class="btn wa-btn" id="waBtn2" onclick="openWhatsApp()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

<div id="toast"></div>

<script>
let savedPhone = '';

async function saveContact() {
  const name = document.getElementById('cName').value.trim();
  const phone = document.getElementById('cPhone').value.trim().replace(/\D/g,'');
  const email = document.getElementById('cEmail').value.trim();
  const ctype = document.getElementById('cType').value;
  const status = document.getElementById('cStatus').value;
  const state = document.getElementById('cState').value.trim();
  const city = document.getElementById('cCity').value.trim();
  const source = document.getElementById('cSource').value.trim();
  const remark = document.getElementById('cRemark').value.trim();

  if (!name) { toast('Name is required', 'error'); return; }
  if (phone.length < 10) { toast('Valid phone number required', 'error'); return; }

  try {
    const r = await fetch('/api/crm/customers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name, phone: phone.slice(-10), email: email || null,
        customer_type: ctype, status, state: state || null, city: city || null,
        source: source || null, remark: remark || null, country: 'India'
      })
    });
    const data = await r.json();
    if (!r.ok) { toast(data.error || 'Failed to save', 'error'); return; }
    savedPhone = phone.slice(-10);
    document.getElementById('formWrap').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
    document.getElementById('successText').textContent = `${name} (${phone}) added as ${ctype} — ${status}`;
  } catch (e) {
    toast('Error: ' + e.message, 'error');
  }
}

function openWhatsApp() {
  const phone = savedPhone || document.getElementById('cPhone').value.trim().replace(/\D/g,'');
  if (phone.length < 10) { toast('Enter a phone number first', 'error'); return; }
  window.open('https://wa.me/91' + phone.slice(-10), '_blank');
}

function resetForm() {
  document.getElementById('formWrap').style.display = 'block';
  document.getElementById('successMsg').style.display = 'none';
  document.getElementById('cName').value = '';
  document.getElementById('cPhone').value = '';
  document.getElementById('cEmail').value = '';
  document.getElementById('cSource').value = '';
  document.getElementById('cRemark').value = '';
  document.getElementById('cState').value = '';
  document.getElementById('cCity').value = '';
  document.getElementById('cName').focus();
  savedPhone = '';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className=type?`show ${type}`:'show';setTimeout(()=>el.className='',3500);}
</script>
<script src="js/nav.js"></script>
</body>
</html>
