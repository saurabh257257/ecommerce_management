<script>(function(){try{var a=JSON.parse(sessionStorage.getItem("arambhika_auth")||"null");if(!a||!a.role){location.replace("login.html");return;}window.__AUTH=a;if(a.role==="member"){var p=location.pathname.split("/").pop();if(p!=="team.html"){location.replace("team.html?name="+encodeURIComponent(a.name));}}}catch(e){location.replace("login.html");}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Arambhika Enablers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Stat strip ── */
    .stat-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; }
    .stat-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .stat-body { min-width: 0; }
    .stat-val { font-size: 22px; font-weight: 700; line-height: 1; }
    .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }

    /* ── 3-column grid ── */
    .admin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; align-items: start; }

    /* ── Card overrides (compact) ── */
    .admin-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .ac-head { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px 11px; border-bottom: 1px solid var(--border); }
    .ac-head h3 { font-size: 13px; font-weight: 700; margin: 0; }
    .ac-count { font-size: 11px; color: var(--muted); font-weight: 600; }

    /* ── Member rows ── */
    .member-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid var(--border); }
    .member-row:last-child { border-bottom: none; }
    .member-av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .member-name { font-size: 13px; font-weight: 600; }
    .member-role { font-size: 11px; color: var(--muted); }
    .member-link { font-size: 11px; color: var(--primary); text-decoration: none; white-space: nowrap; }
    .member-link:hover { text-decoration: underline; }

    /* ── Tag / status / type rows ── */
    .tag-row { display: flex; align-items: center; gap: 8px; padding: 7px 14px; border-bottom: 1px solid var(--border); }
    .tag-row:last-child { border-bottom: none; }
    .tag-chip { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; }
    .tag-spacer { flex: 1; }

    /* ── Inline add form ── */
    .add-form { padding: 10px 14px 12px; border-top: 1px solid var(--border); background: var(--bg); }
    .add-row { display: flex; gap: 7px; align-items: center; }
    .add-row input[type=text] { flex: 1; min-width: 0; border: 1px solid var(--border); border-radius: 8px; padding: 6px 9px; font-size: 12px; font-family: inherit; outline: none; background: var(--card); color: var(--text); }
    .add-row input[type=text]:focus { border-color: var(--primary); }
    .add-row input[type=color] { width: 34px; height: 32px; padding: 2px 3px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; flex-shrink: 0; background: var(--card); }
    .color-presets { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; }
    .color-preset { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .1s; }
    .color-preset:hover { transform: scale(1.25); }
    .color-preset.sel { border-color: rgba(0,0,0,.35); transform: scale(1.2); }

    /* ── Products panel ── */
    .prod-actions { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    .prod-actions a, .prod-actions button { font-size: 12px; }
    .prod-stat-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .empty-state { padding: 16px; text-align: center; color: var(--muted); font-size: 12px; }

    @media (max-width: 900px) {
      .admin-grid { grid-template-columns: 1fr 1fr; }
      .stat-strip { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .admin-grid { grid-template-columns: 1fr; }
      .stat-strip { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

  <div class="content">

      <div class="stat-box">
        <div class="stat-icon" style="background:#ede9fe">📦</div>
        <div class="stat-body">
          <div class="stat-val" id="statProducts">—</div>
          <div class="stat-lbl">Products</div>
        </div>
      </div>
      <div class="stat-box">
        <div class="stat-icon" style="background:#dbeafe">👥</div>
        <div class="stat-body">
          <div class="stat-val" id="statMembers">—</div>
          <div class="stat-lbl">Team Members</div>
        </div>
      </div>
      <div class="stat-box">
        <div class="stat-icon" style="background:#dcfce7">🏷️</div>
        <div class="stat-body">
          <div class="stat-val" id="statTags">—</div>
          <div class="stat-lbl">Tags</div>
        </div>
      </div>
      <div class="stat-box">
        <div class="stat-icon" style="background:#fef9c3">📊</div>
        <div class="stat-body">
          <div class="stat-val" id="statStatuses">—</div>
          <div class="stat-lbl">Statuses</div>
        </div>
      </div>

<div id="toast"></div>

<script>
const PRESET_COLORS = ['#4f46e5','#7c3aed','#db2777','#dc2626','#ea580c','#d97706','#16a34a','#0891b2','#0284c7','#475569'];
let members = [], tags = [], statuses = [], ctypes = [];

async function init() {
  renderPresets('colorPresets', 'newColor', selectMemberColor);
  renderPresets('tagColorPresets', 'newTagColor', selectTagColor);
  renderPresets('statusColorPresets', 'newStatusColor', selectStatusColor);
  renderPresets('ctypeColorPresets', 'newCtypeColor', selectCtypeColor);
  const [mr, tr, sr, pr, ctr] = await Promise.all([
    fetch('/api/team-members').then(r => r.json()),
    fetch('/api/tags').then(r => r.json()),
    fetch('/api/statuses').then(r => r.json()),
    fetch('/api/products').then(r => r.json()),
    fetch('/api/customer-types').then(r => r.json()),
  ]);
  members = mr.data || [];
  tags    = tr.data || [];
  statuses = sr.data || [];
  ctypes  = ctr.data || [];
  const products = pr.data || [];

  document.getElementById('statProducts').textContent = products.length;
  document.getElementById('statMembers').textContent  = members.length;
  document.getElementById('statTags').textContent     = tags.length;
  document.getElementById('statStatuses').textContent = statuses.length;
  document.getElementById('productAdminCount').textContent = products.length + ' product' + (products.length !== 1 ? 's' : '');

  renderMembers(); renderTags(); renderStatuses(); renderCtypes();
}

function renderPresets(elId, inputId, cb) {
  const el = document.getElementById(elId);
  const colorInput = document.getElementById(inputId);
  el.innerHTML = PRESET_COLORS.map(c =>
    `<div class="color-preset${colorInput.value===c?' sel':''}" style="background:${c}" onclick="(${cb.toString()})('${c}')"></div>`
  ).join('');
}

function selectMemberColor(c) { document.getElementById('newColor').value = c; renderPresets('colorPresets','newColor',selectMemberColor); }
function selectTagColor(c)    { document.getElementById('newTagColor').value = c; renderPresets('tagColorPresets','newTagColor',selectTagColor); }
function selectStatusColor(c) { document.getElementById('newStatusColor').value = c; renderPresets('statusColorPresets','newStatusColor',selectStatusColor); }
function selectCtypeColor(c)  { document.getElementById('newCtypeColor').value = c; renderPresets('ctypeColorPresets','newCtypeColor',selectCtypeColor); }

/* ── Render helpers ── */
function renderMembers() {
  document.getElementById('memberCount').textContent = members.length + ' member' + (members.length!==1?'s':'');
  const el = document.getElementById('memberList');
  if (!members.length) { el.innerHTML = '<div class="empty-state">No team members yet</div>'; return; }
  el.innerHTML = members.map(m => `
    <div class="member-row" id="mr-${m.id}" style="flex-wrap:wrap">
      <div class="member-av" style="background:${m.color}">${(m.name||'?')[0].toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <div class="member-name">${esc(m.name)}</div>
        <div class="member-role">${m.role ? esc(m.role) : '<em style="opacity:.5">No role</em>'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="text" id="mpw-${m.id}" placeholder="Login password" value="${esc(m.password||'')}" style="font-size:12px;padding:5px 9px;border:1px solid var(--border);border-radius:7px;width:130px">
        <button class="btn btn-outline btn-sm" style="font-size:11px;padding:4px 9px" onclick="saveMemberPassword(${m.id})">Save</button>
      </div>
      <a href="team.html?name=${encodeURIComponent(m.name)}" class="member-link">View →</a>
      <button class="btn btn-danger btn-sm" style="font-size:11px;padding:3px 8px" onclick="deleteMember(${m.id},'${esc(m.name).replace(/'/g,"\\'")}')">✕</button>
    </div>`).join('');
}

function renderCtypes() {
  document.getElementById('ctypeCount').textContent = ctypes.length + ' type' + (ctypes.length!==1?'s':'');
  const el = document.getElementById('ctypeList');
  if (!ctypes.length) { el.innerHTML = '<div class="empty-state">No customer types yet</div>'; return; }
  el.innerHTML = ctypes.map(t => `
    <div class="tag-row" id="ct-${t.id}">
      <span class="tag-chip" style="background:${t.color}">${esc(t.name)}</span>
      <span class="tag-spacer"></span>
      <button class="btn btn-danger btn-sm" style="font-size:11px;padding:3px 8px" onclick="deleteCtype(${t.id},'${esc(t.name).replace(/'/g,"\\'")}')">✕</button>
    </div>`).join('');
}

function renderTags() {
  document.getElementById('tagCount').textContent = tags.length + ' tag' + (tags.length!==1?'s':'');
  document.getElementById('statTags').textContent = tags.length;
  const el = document.getElementById('tagList');
  if (!tags.length) { el.innerHTML = '<div class="empty-state">No tags yet</div>'; return; }
  el.innerHTML = tags.map(t => `
    <div class="tag-row" id="tr-${t.id}">
      <span class="tag-chip" style="background:${t.color}">${esc(t.name)}</span>
      <span class="tag-spacer"></span>
      <button class="btn btn-danger btn-sm" style="font-size:11px;padding:3px 8px" onclick="deleteTag(${t.id},'${esc(t.name).replace(/'/g,"\\'")}')">✕</button>
    </div>`).join('');
}

function renderStatuses() {
  document.getElementById('statusCount').textContent = statuses.length + ' status' + (statuses.length!==1?'es':'');
  document.getElementById('statStatuses').textContent = statuses.length;
  const el = document.getElementById('statusList');
  if (!statuses.length) { el.innerHTML = '<div class="empty-state">No statuses yet</div>'; return; }
  el.innerHTML = statuses.map(s => `
    <div class="tag-row" id="sr-${s.id}">
      <span class="tag-chip" style="background:${s.color}">${esc(s.name)}</span>
      <span class="tag-spacer"></span>
      <button class="btn btn-danger btn-sm" style="font-size:11px;padding:3px 8px" onclick="deleteStatus(${s.id},'${esc(s.name).replace(/'/g,"\\'")}')">✕</button>
    </div>`).join('');
}

/* ── Add / Delete ── */
async function addMember() {
  const name = document.getElementById('newName').value.trim();
  const role = document.getElementById('newRole').value.trim();
  const color = document.getElementById('newColor').value;
  if (!name) { toast('Name is required', 'error'); return; }
  const r = await fetch('/api/team-members', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,role,color}) });
  const d = await r.json();
  if (d.error) { toast(d.error, 'error'); return; }
  members.push({ id:d.id, name:d.name, role, color });
  document.getElementById('newName').value = '';
  document.getElementById('newRole').value = '';
  document.getElementById('statMembers').textContent = members.length;
  renderMembers(); toast('Team member added', 'success');
}
async function saveMemberPassword(id) {
  const pwInput = document.getElementById('mpw-'+id);
  const password = pwInput.value.trim();
  if (password.toLowerCase() === 'admin') { toast('That password is reserved for Admin — choose another', 'error'); return; }
  const m = members.find(x => x.id === id);
  await fetch(`/api/team-members/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ color: m.color, role: m.role, password }) });
  if (m) m.password = password;
  toast(password ? `Login password set for ${m.name}` : `Password cleared for ${m.name}`, 'success');
}
async function deleteMember(id, name) {
  if (!confirm(`Remove ${name}?`)) return;
  await fetch(`/api/team-members/${id}`, { method:'DELETE' });
  members = members.filter(m => m.id !== id);
  document.getElementById('statMembers').textContent = members.length;
  renderMembers(); toast('Member removed', 'success');
}

async function addCtype() {
  const name = document.getElementById('newCtypeName').value.trim();
  const color = document.getElementById('newCtypeColor').value;
  if (!name) { toast('Type name is required', 'error'); return; }
  const r = await fetch('/api/customer-types', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, color}) });
  const d = await r.json();
  if (d.error) { toast(d.error, 'error'); return; }
  ctypes.push({ id:d.id, name:d.name, color });
  document.getElementById('newCtypeName').value = '';
  renderCtypes(); toast('Customer type created', 'success');
}
async function deleteCtype(id, name) {
  if (!confirm(`Delete type "${name}"?`)) return;
  await fetch(`/api/customer-types/${id}`, { method:'DELETE' });
  ctypes = ctypes.filter(t => t.id !== id);
  renderCtypes(); toast('Type deleted', 'success');
}

async function addTag() {
  const name = document.getElementById('newTagName').value.trim();
  const color = document.getElementById('newTagColor').value;
  if (!name) { toast('Tag name is required', 'error'); return; }
  const r = await fetch('/api/tags', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, color}) });
  const d = await r.json();
  if (d.error) { toast(d.error, 'error'); return; }
  tags.push({ id:d.id, name:d.name, color });
  document.getElementById('newTagName').value = '';
  renderTags(); toast('Tag created', 'success');
}
async function deleteTag(id, name) {
  if (!confirm(`Delete tag "${name}"?`)) return;
  await fetch(`/api/tags/${id}`, { method:'DELETE' });
  tags = tags.filter(t => t.id !== id);
  renderTags(); toast('Tag deleted', 'success');
}

async function addStatus() {
  const name = document.getElementById('newStatusName').value.trim();
  const color = document.getElementById('newStatusColor').value;
  if (!name) { toast('Status name is required', 'error'); return; }
  const r = await fetch('/api/statuses', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, color}) });
  const d = await r.json();
  if (d.error) { toast(d.error, 'error'); return; }
  statuses.push({ id:d.id, name:d.name, color });
  document.getElementById('newStatusName').value = '';
  renderStatuses(); toast('Status created', 'success');
}
async function deleteStatus(id, name) {
  if (!confirm(`Delete status "${name}"?`)) return;
  await fetch(`/api/statuses/${id}`, { method:'DELETE' });
  statuses = statuses.filter(s => s.id !== id);
  renderStatuses(); toast('Status deleted', 'success');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className=type?`show ${type}`:'show';setTimeout(()=>el.className='',3500);}

init();
</script>
